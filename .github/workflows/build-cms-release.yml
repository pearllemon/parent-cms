name: build-cms-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (MAJOR.MINOR.PATCH[-prerelease]) — no 'v' prefix"
        required: true
        type: string
      release_notes:
        description: "Optional release notes (markdown)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: cms-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CMS_RELEASE_VERSION: ${{ inputs.version }}
      CMS_RELEASE_NOTES: ${{ inputs.release_notes }}
    steps:
      - name: Validate semantic version
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid semantic version: ${{ inputs.version }}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if tag already exists
        run: |
          if git rev-parse "refs/tags/cms-v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag cms-v${{ inputs.version }} already exists (immutable)."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync managed source
        run: node cms-distribution/scripts/sync-managed.mjs

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bunx vitest run

      - name: Production build
        run: bun run build

      - name: Build release manifest (checksums + metadata)
        run: node cms-distribution/scripts/build-manifest.mjs "${{ inputs.version }}"

      - name: Commit manifest + synced sources
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cms-distribution
          if git diff --cached --quiet; then
            echo "No managed changes to commit."
          else
            git commit -m "chore(cms): release cms-v${{ inputs.version }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create immutable tag
        run: |
          git tag -a "cms-v${{ inputs.version }}" -m "CMS release ${{ inputs.version }}"
          git push origin "cms-v${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cms-v${{ inputs.version }}
          name: CMS v${{ inputs.version }}
          body: |
            ${{ inputs.release_notes }}

            Manifest: `cms-distribution/manifest.json`
          files: |
            cms-distribution/manifest.json

      - name: Record release in Parent CMS (best-effort)
        if: ${{ env.PARENT_RELEASE_WEBHOOK != '' }}
        env:
          PARENT_RELEASE_WEBHOOK: ${{ secrets.PARENT_RELEASE_WEBHOOK }}
          PARENT_RELEASE_TOKEN: ${{ secrets.PARENT_RELEASE_TOKEN }}
        run: |
          curl -fsS -X POST "$PARENT_RELEASE_WEBHOOK" \
            -H "Authorization: Bearer $PARENT_RELEASE_TOKEN" \
            -H "Content-Type: application/json" \
            --data @cms-distribution/manifest.json \
            || echo "::warning::Parent CMS record failed (continuing)."
